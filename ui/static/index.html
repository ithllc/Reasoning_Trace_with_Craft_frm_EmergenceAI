<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CRAFT Reasoning Lab</title>
  <style>
    :root{color-scheme:dark;--bg:#08111f;--panel:#111d30;--line:#263955;--text:#edf4ff;--muted:#98aac2;--cyan:#42d3ff;--green:#48dc9b;--amber:#ffbd59;--red:#ff6f7d}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 0,#173352 0,transparent 34%),var(--bg);color:var(--text);font:15px/1.5 Inter,system-ui,sans-serif}header{padding:36px clamp(20px,5vw,70px) 20px;display:flex;justify-content:space-between;align-items:end}h1{margin:0;font-size:clamp(30px,5vw,58px);letter-spacing:-.05em}h1 span{color:var(--cyan)}header p{color:var(--muted);max-width:560px}.actions{display:flex;gap:10px}button{border:1px solid var(--line);background:#172842;color:var(--text);padding:9px 13px;border-radius:9px;cursor:pointer}button:hover{border-color:var(--cyan)}button:disabled{opacity:.5;cursor:not-allowed}main{padding:10px clamp(20px,5vw,70px) 60px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{grid-column:span 4;background:linear-gradient(145deg,#14233a,#0d1829);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 16px 45px #0005}.wide{grid-column:span 8}.full{grid-column:1/-1}.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.12em}.metric{font-size:27px;font-weight:750;margin:6px 0}.pill{display:inline-block;border:1px solid var(--line);border-radius:99px;padding:3px 9px;margin:3px;color:var(--muted)}.passed{color:var(--green)}.needs_review,.queued{color:var(--amber)}.running{color:var(--cyan)}.failed,.cancelled{color:var(--red)}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{text-align:left;padding:11px 8px;border-bottom:1px solid var(--line);vertical-align:top}th{color:var(--muted);font-weight:500}code{color:#b9e9ff}small{color:var(--muted)}.voice-row{display:flex;gap:10px;align-items:center}.voice-row input{flex:1;min-width:0;border:1px solid var(--line);background:#091423;color:var(--text);padding:11px;border-radius:9px}.voice-answer{white-space:pre-wrap;background:#091423;border:1px solid var(--line);border-radius:9px;padding:14px;min-height:52px}.chart-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}.chart{background:#091423;border:1px solid var(--line);border-radius:12px;padding:12px}.chart svg{width:100%;height:120px}.bar-row{display:grid;grid-template-columns:minmax(150px,1fr) 3fr 55px;gap:9px;align-items:center;margin:9px 0}.bar-track{height:12px;background:#16243a;border-radius:9px;overflow:hidden}.bar{height:100%;background:var(--cyan)}.bar.validation{background:var(--green)}@media(max-width:900px){.card,.wide{grid-column:1/-1}header{display:block}.actions{margin-top:15px}.voice-row{align-items:stretch;flex-direction:column}.chart-grid{grid-template-columns:1fr}.bar-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><div><div class="label">Emergence CRAFT × Nebius Token Factory</div><h1>Reasoning <span>Lab</span></h1><p>Manage grounded teacher traces, dataset review, Qwen LoRA training, and promotion evaluations from one local control surface.</p></div><div class="actions"><button onclick="load()">Refresh</button></div></header>
<main><div id="app" class="grid"><div class="card full">Loading live project state…</div></div></main>
<script>
const VOICE_API='http://127.0.0.1:8766';
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function spark(session){const m=session.checkpoint_metrics||[];if(!m.length)return'';const values=m.flatMap(x=>[x.train_loss,x.validation_loss]),lo=Math.min(...values),hi=Math.max(...values),span=hi-lo||1,pts=k=>m.map((x,i)=>`${15+i*85},${105-(x[k]-lo)/span*85}`).join(' ');return `<svg viewBox="0 0 200 120" role="img" aria-label="Loss by checkpoint"><polyline fill="none" stroke="#42d3ff" stroke-width="4" points="${pts('train_loss')}"/><polyline fill="none" stroke="#48dc9b" stroke-width="4" points="${pts('validation_loss')}"/><text x="5" y="117" fill="#98aac2" font-size="10">step 1</text><text x="165" y="117" fill="#98aac2" font-size="10">step 3</text></svg>`}
function historyCharts(history){const max=Math.max(...history.flatMap(s=>(s.checkpoint_metrics||[]).flatMap(m=>[m.train_loss,m.validation_loss])),1);return `<div class="chart"><strong>Final loss comparison</strong>${history.map(s=>{const m=(s.checkpoint_metrics||[]).at(-1)||{};return `<div class="bar-row"><small>${esc(s.label)}</small><div><div class="bar-track"><div class="bar" style="width:${(m.train_loss/max*100).toFixed(1)}%"></div></div><div class="bar-track"><div class="bar validation" style="width:${(m.validation_loss/max*100).toFixed(1)}%"></div></div></div><small>${Number(m.train_loss).toFixed(3)} / ${Number(m.validation_loss).toFixed(3)}</small></div>`}).join('')}<small><span class="running">Blue</span> training · <span class="passed">green</span> validation · lower is better. Compare trends cautiously because datasets differ.</small></div><div class="chart-grid">${history.map(s=>`<div class="chart"><strong>${esc(s.label)}</strong>${spark(s)}<small>${esc(s.train_examples)} train / ${esc(s.validation_examples)} validation · ${esc(s.trained_tokens)} tokens · ${esc(s.duration_seconds)}s</small></div>`).join('')}</div>`}
async function review(id,status){await fetch('/api/reviews/'+encodeURIComponent(id),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});load()}
async function cancelJob(id){if(!confirm('Cancel '+id+'?'))return;await fetch('/api/jobs/'+encodeURIComponent(id)+'/cancel',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});load()}
async function load(){const r=await fetch('/api/dashboard');const d=await r.json();if(d.error){app.innerHTML='<div class="card full failed">'+esc(d.error)+'</div>';return}const ex=d.examples||[],jobs=d.jobs||[],passed=ex.filter(x=>x.validation==='passed').length;app.innerHTML=`
<section class="card"><div class="label">Teacher</div><div class="metric">${esc(d.teacher.verified_model_id)}</div><small>${esc(d.teacher.agent_name)} · structured decision summaries</small></section>
<section class="card"><div class="label">Student</div><div class="metric">Qwen3 A3B</div><small>${esc(d.student.model)} · ${esc(d.student.parameter_count)}</small></section>
<section class="card"><div class="label">Current dataset</div><div class="metric">${ex.length}</div><small>${esc(d.manifest?.train_examples)} train / ${esc(d.manifest?.validation_examples)} validation · immutable completed-run view</small></section>
<section class="card wide"><div class="label">Dataset examples (first 20)</div><table><thead><tr><th>ID</th><th>Domain</th><th>Decision</th><th>Policy outcome</th></tr></thead><tbody>${ex.slice(0,20).map(x=>`<tr><td><code>${esc(x.id)}</code></td><td>${esc(x.domain)}</td><td>${esc(x.decision_summary)}</td><td class="${esc(x.validation)}">${esc(x.validation)}</td></tr>`).join('')}</tbody></table><p><small>Approval controls are hidden for completed datasets so dashboard exploration cannot mutate training history.</small></p></section>
<section class="card"><div class="label">LoRA configuration</div><div class="metric">r=${esc(d.training.hyperparameters.lora_r)}</div><span class="pill">alpha ${esc(d.training.hyperparameters.lora_alpha)}</span><span class="pill">batch ${esc(d.training.hyperparameters.batch_size)}</span><span class="pill">epochs ${esc(d.training.hyperparameters.n_epochs)}</span><span class="pill">ctx ${esc(d.training.hyperparameters.context_length)}</span></section>
<section class="card full"><div class="label">Ask the dashboard</div><div class="voice-row"><button id="listenButton" onclick="listen()">🎙 Ask by voice</button><input id="voiceQuestion" maxlength="2000" placeholder="What does validation loss mean?" onkeydown="if(event.key==='Enter')askDashboard()"><button id="askButton" onclick="askDashboard()">Ask</button><button id="speakButton" onclick="speakAnswer()" disabled>🔊 Read answer</button></div><p id="voiceStatus"><small>Checking the separate voice service… Browser speech recognition depends on browser support; typing always works.</small></p><div id="voiceAnswer" class="voice-answer">Answers are grounded only in the current dashboard data.</div></section>
<section class="card full"><div class="label">Nebius fine-tuning jobs</div>${d.jobs_error?`<p class="failed">${esc(d.jobs_error)}</p>`:''}<table><thead><tr><th>Job</th><th>Model</th><th>Status</th><th>Progress</th><th>Action</th></tr></thead><tbody>${jobs.map(j=>`<tr><td><code>${esc(j.id)}</code></td><td>${esc(j.model)}</td><td class="${esc(j.status)}">${esc(j.status)}</td><td>${esc(j.trained_steps??0)} / ${esc(j.total_steps??'?')}</td><td>${['running','queued','validating_files'].includes(j.status)?`<button onclick="cancelJob('${esc(j.id)}')">Cancel</button>`:''}</td></tr>`).join('')||'<tr><td colspan="5">No jobs</td></tr>'}</tbody></table></section>
<section class="card full"><div class="label">Training session history and comparison</div><p><small>Each mini-chart shows training loss and validation loss across that session's checkpoints. Loss measures next-token prediction; it is not an LLM benchmark score.</small></p>${historyCharts(d.training_history||[]) }<table><thead><tr><th>Session</th><th>Dataset</th><th>Split</th><th>Context</th><th>Limit / actual</th><th>Evaluation</th></tr></thead><tbody>${(d.training_history||[]).map(s=>`<tr><td><code>${esc(s.job_id)}</code><br>${esc(s.label)}</td><td><code>${esc(s.dataset_dir)}</code></td><td>${esc(s.train_examples)} / ${esc(s.validation_examples)}</td><td>${esc(s.context_length)}</td><td>${esc(s.time_limit_seconds)}s / ${esc(s.duration_seconds)}s</td><td>${esc(s.evaluations?.base_vs_lora||s.evaluations?.craft_held_out_suite||'pending')}</td></tr>`).join('')}</tbody></table></section>
${d.training_result?`<section class="card full"><div class="label">Actual LoRA training results</div><div class="metric ${esc(d.training_result.status)}">${esc(d.training_result.status)}</div><p><small><strong>Status</strong> tells whether Nebius completed the fine-tuning job without an error. <strong>Steps</strong> are optimizer updates; this demo completed ${esc(d.training_result.trained_steps)}/${esc(d.training_result.total_steps)}. <strong>Trained tokens</strong> are text tokens processed during training: ${esc(d.training_result.trained_tokens)}.</small></p><table><thead><tr><th>Checkpoint</th><th>Training loss</th><th>Validation loss</th><th>What it means</th></tr></thead><tbody>${(d.training_result.checkpoint_metrics||[]).map(m=>`<tr><td>Step ${esc(m.step)}</td><td>${Number(m.train_loss).toFixed(4)}</td><td>${Number(m.validation_loss).toFixed(4)}</td><td><small>Training loss measures fit to training examples; validation loss measures fit to held-out examples. Lower is better.</small></td></tr>`).join('')}</tbody></table><p><small>These are real diagnostics from this LoRA run. They are <strong>not benchmark scores</strong>; GSM8K, MMLU, ARC, GPQA, and CRAFT remain pending until the adapter is deployed and evaluated.</small></p></section>`:''}
<section class="card full"><div class="label">LLM evaluation suite</div><p><small><strong>Task</strong> names the capability test. <strong>Metric</strong> names its scoring rule—accuracy is the share correct, exact match requires the expected answer, and normalized accuracy adjusts multiple-choice scoring. <strong>Qwythos reference</strong> is the published comparison target, not this LoRA's result.</small></p><table><thead><tr><th>Task</th><th>Metrics</th><th>Qwythos reference</th></tr></thead><tbody>${d.evaluations.benchmarks.map(b=>`<tr><td>${esc(b.task)}</td><td>${b.metrics.map(m=>`<span class="pill">${esc(m)}</span>`).join('')}</td><td>${b.qwythos_reference.map(esc).join(', ')}</td></tr>`).join('')}</tbody></table><p><small><strong>CRAFT promotion gate:</strong> the adapter must pass ${(d.evaluations.craft_evals.required_pass_rate*100).toFixed(0)}% of grounded workflow cases and must not score worse than the base model before it can be promoted.</small></p></section>`}
async function voiceState(){try{const r=await fetch(VOICE_API+'/api/voice/status');const s=await r.json();voiceStatus.innerHTML=`<small>${s.configured?'Ready':'Inference disabled'} · ${esc(s.model||'model not configured')} · $${Number(s.spent_usd).toFixed(4)} spent / $${Number(s.budget_usd).toFixed(2)} hard limit</small>`;askButton.disabled=!s.configured}catch(e){voiceStatus.innerHTML='<small class="failed">Voice subprocess is offline. Start <code>python3 ui/voice_server.py</code>.</small>';askButton.disabled=true}}
async function askDashboard(){const q=voiceQuestion.value.trim();if(!q)return;askButton.disabled=true;voiceAnswer.textContent='Thinking…';try{const r=await fetch(VOICE_API+'/api/voice/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});const d=await r.json();if(!r.ok)throw new Error(d.error||'Request failed');voiceAnswer.textContent=d.answer;speakButton.disabled=false;voiceStatus.innerHTML=`<small>Last request: $${Number(d.cost_usd).toFixed(6)} · total $${Number(d.budget.spent_usd).toFixed(4)} / $${Number(d.budget.budget_usd).toFixed(2)}</small>`}catch(e){voiceAnswer.textContent=e.message}finally{askButton.disabled=false}}
function listen(){const SpeechRecognition=window.SpeechRecognition||window.webkitSpeechRecognition;if(!SpeechRecognition){voiceStatus.innerHTML='<small class="failed">Speech recognition is unavailable in this browser; type your question instead.</small>';return}const recognition=new SpeechRecognition();recognition.lang='en-US';recognition.interimResults=false;listenButton.disabled=true;voiceStatus.innerHTML='<small>Listening…</small>';recognition.onresult=e=>{voiceQuestion.value=e.results[0][0].transcript;askDashboard()};recognition.onerror=e=>voiceStatus.innerHTML=`<small class="failed">Speech recognition: ${esc(e.error)}</small>`;recognition.onend=()=>listenButton.disabled=false;recognition.start()}
function speakAnswer(){if(!('speechSynthesis'in window))return;window.speechSynthesis.cancel();const utterance=new SpeechSynthesisUtterance(voiceAnswer.textContent);utterance.lang='en-US';window.speechSynthesis.speak(utterance)}
load().then(voiceState);setInterval(load,15000);setInterval(voiceState,30000);
</script>
</body></html>
