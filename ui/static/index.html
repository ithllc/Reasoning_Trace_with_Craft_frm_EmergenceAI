<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>EmergeGPT</title>
  <style>
    :root{color-scheme:dark;--bg:#08111f;--panel:#111d30;--line:#263955;--text:#edf4ff;--muted:#98aac2;--cyan:#42d3ff;--green:#48dc9b;--amber:#ffbd59;--red:#ff6f7d}*{box-sizing:border-box}[hidden]{display:none!important}body{margin:0;background:radial-gradient(circle at 12% 0,#173352 0,transparent 34%),var(--bg);color:var(--text);font:15px/1.5 Inter,system-ui,sans-serif}header{padding:36px clamp(20px,5vw,70px) 20px;display:flex;justify-content:space-between;align-items:end}h1{margin:0;font-size:clamp(30px,5vw,58px);letter-spacing:-.05em}h1 span{color:var(--cyan)}header p{color:var(--muted);max-width:650px}.actions,.tabs{display:flex;gap:10px;flex-wrap:wrap}button,select,input{border:1px solid var(--line);background:#172842;color:var(--text);padding:9px 13px;border-radius:9px}button{cursor:pointer}button:hover{border-color:var(--cyan)}button:disabled{opacity:.5;cursor:not-allowed}main{padding:10px clamp(20px,5vw,70px) 60px}.tabs{position:sticky;top:0;z-index:5;padding:10px 0 16px;background:linear-gradient(var(--bg) 75%,transparent)}.tabs button[aria-selected="true"]{border-color:var(--cyan);color:var(--cyan);background:#123047}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{grid-column:span 4;background:linear-gradient(145deg,#14233a,#0d1829);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 16px 45px #0005}.wide{grid-column:span 8}.full{grid-column:1/-1}.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.12em}.metric{font-size:27px;font-weight:750;margin:6px 0}.pill{display:inline-block;border:1px solid var(--line);border-radius:99px;padding:3px 9px;margin:3px;color:var(--muted)}.passed{color:var(--green)}.needs_review,.queued{color:var(--amber)}.running{color:var(--cyan)}.failed,.cancelled{color:var(--red)}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{text-align:left;padding:11px 8px;border-bottom:1px solid var(--line);vertical-align:top}th{color:var(--muted);font-weight:500}code{color:#b9e9ff}small{color:var(--muted)}details{margin-top:14px;border-top:1px solid var(--line);padding-top:10px}summary{cursor:pointer;color:var(--cyan);font-weight:650}.voice-row{display:flex;gap:10px;align-items:center}.voice-row input{flex:1;min-width:0;background:#091423}.voice-answer,.preview{white-space:pre-wrap;background:#091423;border:1px solid var(--line);border-radius:9px;padding:14px;min-height:52px;overflow:auto}.voice-indicators,.stepper{display:flex;gap:8px;flex-wrap:wrap;margin:10px 0}.indicator,.step{border:1px solid var(--line);border-radius:99px;padding:4px 10px;color:var(--muted)}.indicator.ready,.step.active{border-color:#238a63;color:var(--green);background:#123226}.indicator.offline{border-color:#75333c;color:var(--red);background:#30191e}.indicator.busy{border-color:#346a83;color:var(--cyan);background:#122b38}.chart-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:14px}.chart{background:#091423;border:1px solid var(--line);border-radius:12px;padding:12px}.chart svg{width:100%;height:120px}.bar-row{display:grid;grid-template-columns:minmax(150px,1fr) 3fr 55px;gap:9px;align-items:center;margin:9px 0}.bar-track{height:12px;background:#16243a;border-radius:9px;overflow:hidden}.bar{height:100%;background:var(--cyan)}.bar.validation{background:var(--green)}@media(max-width:900px){.card,.wide{grid-column:1/-1}header{display:block}.actions{margin-top:15px}.voice-row{align-items:stretch;flex-direction:column}.chart-grid{grid-template-columns:1fr}.bar-row{grid-template-columns:1fr}}
  </style>
</head>
<body>
<header><div><div class="label">Vendor-neutral model lifecycle control plane</div><h1><span>Emerge</span>GPT</h1><p>Build governed evidence pipelines, interchangeable harnesses, evaluations, schedules, model-health signals, and approval-gated training integrations.</p></div><div class="actions"><button onclick="refreshDocs()">Refresh docs</button></div></header>
<main><nav class="tabs" role="tablist" aria-label="EmergeGPT workspaces" onkeydown="tabKeys(event)"><button id="tab-overview" role="tab" aria-selected="true" aria-controls="view-overview" onclick="showView('overview')">Overview</button><button id="tab-build" role="tab" aria-selected="false" aria-controls="mcpBuilder" tabindex="-1" onclick="showView('build')">Build &amp; Run</button><button id="tab-quality" role="tab" aria-selected="false" aria-controls="view-quality" tabindex="-1" onclick="showView('quality')">Quality &amp; Cost</button><button id="tab-data" role="tab" aria-selected="false" aria-controls="view-data" tabindex="-1" onclick="showView('data')">Data &amp; History</button></nav><div id="app" class="grid"><div class="card full">Loading live project state…</div></div></main>
<script>
const VOICE_API='http://127.0.0.1:8766';
let recognition=null,voiceBusy=false,lastQuestion='',lastAnswer='Answers are grounded only in the current dashboard data.';
let mcpDraft=null,mcpPreview=null;
let currentView=(location.hash||'#overview').slice(1);if(!['overview','build','quality','data'].includes(currentView))currentView='overview';
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function showView(view,focus=false){currentView=view;location.hash=view;document.querySelectorAll('[data-view]').forEach(el=>el.hidden=el.dataset.view!==view);document.querySelectorAll('[role="tab"]').forEach(tab=>{const selected=tab.id===`tab-${view}`;tab.setAttribute('aria-selected',selected);tab.tabIndex=selected?0:-1;if(selected&&focus)tab.focus()})}
function tabKeys(e){const tabs=[...document.querySelectorAll('[role="tab"]')],i=tabs.indexOf(document.activeElement);if(i<0)return;let next;if(e.key==='ArrowRight')next=(i+1)%tabs.length;if(e.key==='ArrowLeft')next=(i-1+tabs.length)%tabs.length;if(e.key==='Home')next=0;if(e.key==='End')next=tabs.length-1;if(next!==undefined){e.preventDefault();tabs[next].click();tabs[next].focus()}}
function assignViews(){const mapping={'Nebius fine-tuning jobs':'data','Training session history and comparison':'data','Actual LoRA training results':'data','Evaluation methods actually used':'quality'},collapse=new Set(Object.keys(mapping));document.querySelectorAll('section.card').forEach(section=>{const label=section.querySelector('.label')?.textContent;if(!section.dataset.view&&mapping[label])section.dataset.view=mapping[label];if(collapse.has(label)&&!section.querySelector(':scope > details')){const details=document.createElement('details'),summary=document.createElement('summary');summary.textContent='View details';details.append(summary);[...section.children].filter(child=>!child.classList.contains('label')).forEach(child=>details.append(child));section.append(details)}})}
function spark(session){const m=session.checkpoint_metrics||[];if(!m.length)return'';const values=m.flatMap(x=>[x.train_loss,x.validation_loss]),lo=Math.min(...values),hi=Math.max(...values),span=hi-lo||1,pts=k=>m.map((x,i)=>`${15+i*85},${105-(x[k]-lo)/span*85}`).join(' ');return `<svg viewBox="0 0 200 120" role="img" aria-label="Loss by checkpoint"><polyline fill="none" stroke="#42d3ff" stroke-width="4" points="${pts('train_loss')}"/><polyline fill="none" stroke="#48dc9b" stroke-width="4" points="${pts('validation_loss')}"/><text x="5" y="117" fill="#98aac2" font-size="10">step 1</text><text x="165" y="117" fill="#98aac2" font-size="10">step 3</text></svg>`}
function historyCharts(history){const max=Math.max(...history.flatMap(s=>(s.checkpoint_metrics||[]).flatMap(m=>[m.train_loss,m.validation_loss])),1);return `<div class="chart"><strong>Final loss comparison</strong>${history.map(s=>{const m=(s.checkpoint_metrics||[]).at(-1)||{};return `<div class="bar-row"><small>${esc(s.label)}</small><div><div class="bar-track"><div class="bar" style="width:${(m.train_loss/max*100).toFixed(1)}%"></div></div><div class="bar-track"><div class="bar validation" style="width:${(m.validation_loss/max*100).toFixed(1)}%"></div></div></div><small>${Number(m.train_loss).toFixed(3)} / ${Number(m.validation_loss).toFixed(3)}</small></div>`}).join('')}<small><span class="running">Blue</span> training · <span class="passed">green</span> validation · lower is better. Compare trends cautiously because datasets differ.</small></div><div class="chart-grid">${history.map(s=>`<div class="chart"><strong>${esc(s.label)}</strong>${spark(s)}<small>${esc(s.train_examples)} train / ${esc(s.validation_examples)} validation · ${esc(s.trained_tokens)} tokens · ${esc(s.duration_seconds)}s</small></div>`).join('')}</div>`}
async function review(id,status){await fetch('/api/reviews/'+encodeURIComponent(id),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});load()}
async function cancelJob(id){if(!confirm('Cancel '+id+'?'))return;await fetch('/api/jobs/'+encodeURIComponent(id)+'/cancel',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});load()}
async function post(url,body={}){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)}),d=await r.json();if(!r.ok||d.error)throw new Error(d.error||'Request failed');return d}
async function refreshDocs(){try{const d=await post('/api/docs/refresh');alert(`Indexed ${d.source_count} approved sources`)}catch(e){alert(e.message)}}
async function searchDocumentation(){const q=document.getElementById('voiceQuestion').value.trim(),out=document.getElementById('docsResults');if(!q)return;out.textContent='Finding approved sources…';try{const r=await fetch('/api/docs/search?q='+encodeURIComponent(q)),d=await r.json();out.innerHTML=(d.results||[]).map(x=>`<p><strong>${esc(x.title)}</strong> <code>${esc(x.path)}</code><br><small>${esc(x.excerpt)}</small></p>`).join('')||'<p>No approved source matched.</p>'}catch(e){out.textContent=e.message}}
async function createSchedule(){const out=document.getElementById('scheduleResult');try{const d=await post('/api/schedules',{name:document.getElementById('scheduleName').value,expression:document.getElementById('cron').value,timezone:document.getElementById('tz').value,workflow:{action:'evaluate_and_request_approval',schedule_policy:{misfire:document.getElementById('misfire').value,max_concurrency:1}}});out.textContent='Next runs: '+d.next_fires.join(' · ');loadSchedules()}catch(e){out.textContent=e.message}}
async function loadSchedules(){const body=document.getElementById('scheduleRows');if(!body)return;try{const d=await fetch('/api/schedules').then(r=>r.json());body.innerHTML=(d.schedules||[]).map(s=>`<tr><td>${esc(s.name)}<br><code>${esc(s.expression)}</code><details><summary>${(s.fires||[]).length} recent fires</summary>${(s.fires||[]).map(f=>`<div><small>${esc(f.intended_fire_at)} · ${esc(f.state)} ${esc(f.error_summary||'')}</small></div>`).join('')||'<small>No history.</small>'}</details></td><td class="${s.enabled?'passed':'needs_review'}">${s.enabled?'active':'paused'}<br><small>${esc(s.workflow?.schedule_policy?.misfire||'fire_once')}</small></td><td><small>${esc(s.next_fire_at||'none')}</small></td><td><button onclick="editSchedule('${esc(s.id)}','${esc(s.name)}','${esc(s.expression)}','${esc(s.timezone)}')">Edit</button> <button onclick="scheduleAction('${esc(s.id)}','${s.enabled?'pause':'resume'}')">${s.enabled?'Pause':'Resume'}</button> <button onclick="scheduleAction('${esc(s.id)}','run-now')">Run now</button> <button onclick="deleteSchedule('${esc(s.id)}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="4">No schedules.</td></tr>'}catch(e){body.innerHTML=`<tr><td colspan="4" class="failed">${esc(e.message)}</td></tr>`}}
async function editSchedule(id,name,expression,timezone){const newName=prompt('Schedule name',name),newExpression=prompt('Cron expression',expression),newTimezone=prompt('IANA timezone',timezone);if(!newName||!newExpression||!newTimezone)return;try{await post(`/api/schedules/${id}`,{name:newName,expression:newExpression,timezone:newTimezone});loadSchedules()}catch(e){alert(e.message)}}
async function scheduleAction(id,action){try{await post(`/api/schedules/${id}/${action}`);loadSchedules()}catch(e){alert(e.message)}}
async function deleteSchedule(id){if(!confirm('Delete this schedule and its fire history?'))return;const r=await fetch(`/api/schedules/${id}`,{method:'DELETE'}),d=await r.json();if(!r.ok)alert(d.error||'Delete failed');loadSchedules()}
const notificationTopics=['pipeline.started','pipeline.completed','pipeline.failed','pipeline.timed_out','approval.required','schedule.misfire','schedule.failed','evaluation.regression','model.degraded','fine_tuning.recommended','budget.warning','budget.exceeded','provider.outage','model.deprecated','craft.authorization_failed','security.violation'];
async function createNotificationProfile(){const channel=document.getElementById('notificationChannel').value,value=document.getElementById('notificationDestination').value.trim(),out=document.getElementById('notificationResult');let config;if(channel==='email')config={recipient:value};else if(channel==='slack')config={webhook_env:value};else{const [token_env,chat_id]=value.split(':',2);config={token_env,chat_id}}try{const profile=await post('/api/notifications/profiles',{name:document.getElementById('notificationName').value,channel,config});await post(`/api/notifications/profiles/${profile.id}/subscribe`,{topic:document.getElementById('notificationTopic').value,minimum_severity:document.getElementById('notificationSeverity').value});out.textContent='Notification profile created.';loadNotifications()}catch(e){out.textContent=e.message}}
async function loadNotifications(){const body=document.getElementById('notificationRows');if(!body)return;try{const d=await fetch('/api/notifications').then(r=>r.json());body.innerHTML=(d.profiles||[]).map(p=>`<tr><td>${esc(p.name)}<br><small>${esc(p.channel)}</small></td><td>${(p.subscriptions||[]).map(s=>`<span class="pill">${esc(s.topic)} · ${esc(s.minimum_severity)}</span>`).join('')||'none'}</td><td class="${p.enabled?'passed':'needs_review'}">${p.enabled?'enabled':'disabled'}</td><td><button onclick="notificationAction('${esc(p.id)}','${p.enabled?'disable':'enable'}')">${p.enabled?'Disable':'Enable'}</button> <button onclick="subscribeNotification('${esc(p.id)}')">Add topic</button> <button onclick="deleteNotification('${esc(p.id)}')">Delete</button></td></tr>`).join('')||'<tr><td colspan="4">No notification profiles.</td></tr>';const alerts=document.getElementById('alertRows');if(alerts)alerts.innerHTML=(d.alerts||[]).map(a=>`<tr><td>${esc(a.details?.topic)}<br><small>${esc(a.details?.message||'')}</small></td><td class="${esc(a.severity)}">${esc(a.severity)}</td><td>${esc(a.state)}</td><td>${a.state==='open'?`<button onclick="alertState('${esc(a.id)}','acknowledged')">Acknowledge</button>`:''} ${a.state!=='resolved'?`<button onclick="alertState('${esc(a.id)}','resolved')">Resolve</button>`:''}</td></tr>`).join('')||'<tr><td colspan="4">No alerts.</td></tr>'}catch(e){body.innerHTML=`<tr><td colspan="4" class="failed">${esc(e.message)}</td></tr>`}}
async function notificationAction(id,action){try{await post(`/api/notifications/profiles/${id}/${action}`);loadNotifications()}catch(e){alert(e.message)}}
async function subscribeNotification(id){const topic=prompt('Topic',notificationTopics[0]),severity=prompt('Minimum severity: info, warning, or critical','warning');if(!topic||!severity)return;try{await post(`/api/notifications/profiles/${id}/subscribe`,{topic,minimum_severity:severity});loadNotifications()}catch(e){alert(e.message)}}
async function deleteNotification(id){if(!confirm('Delete this notification profile and subscriptions?'))return;await fetch(`/api/notifications/profiles/${id}`,{method:'DELETE'});loadNotifications()}
async function alertState(id,state){try{await post(`/api/notifications/alerts/${id}`,{state});loadNotifications()}catch(e){alert(e.message)}}
function ensureAlertUI(){const profiles=document.getElementById('notificationRows');if(!profiles||document.getElementById('alertRows'))return;profiles.closest('table').insertAdjacentHTML('afterend','<details><summary>View and manage generated alerts</summary><table><thead><tr><th>Event</th><th>Severity</th><th>State</th><th>Controls</th></tr></thead><tbody id="alertRows"><tr><td colspan="4">Loading alerts…</td></tr></tbody></table></details>')}
async function loadEvaluations(){const defs=document.getElementById('evaluationDefinition'),runs=document.getElementById('evaluationRuns');if(!defs)return;try{const d=await fetch('/api/evaluations').then(r=>r.json());defs.innerHTML=(d.definitions||[]).map(x=>`<option value="${esc(x.id)}">${esc(x.id)} · ${esc(x.description)}</option>`).join('');runs.innerHTML=(d.runs||[]).map(x=>`<tr><td>${esc(x.definition_id)} v${esc(x.definition_version)}</td><td><code>${esc(x.model_id)}</code></td><td class="${esc(x.state)}">${esc(x.state)}</td><td><small>${esc(x.result?.notice||x.error_summary||JSON.stringify(x.result||{}))}</small></td></tr>`).join('')||'<tr><td colspan="4">No evaluation runs.</td></tr>'}catch(e){runs.innerHTML=`<tr><td colspan="4" class="failed">${esc(e.message)}</td></tr>`}}
async function recommendEvaluations(){const out=document.getElementById('evaluationAdvice');try{const d=await post('/api/evaluations/recommend',{domains:document.getElementById('evaluationDomains').value.split(',').map(x=>x.trim()).filter(Boolean),model:document.getElementById('evaluationModel').value,full_supported:document.getElementById('evaluationFull').checked,behavioral_shift:document.getElementById('evaluationShift').value});out.textContent=JSON.stringify(d.suggestion.proposal,null,2)}catch(e){out.textContent=e.message}}
async function runEvaluation(){const out=document.getElementById('evaluationAdvice');try{await post('/api/evaluations/runs',{definition_id:document.getElementById('evaluationDefinition').value,model_id:document.getElementById('evaluationModel').value,comparison_model_id:document.getElementById('evaluationComparison').value||null,parameters:{limit:Number(document.getElementById('evaluationLimit').value)}});out.textContent='Evaluation plan queued. Select a harness only when execution is intended.';loadEvaluations()}catch(e){out.textContent=e.message}}
async function importEvaluation(){const out=document.getElementById('evaluationAdvice');try{await post('/api/evaluations/definitions',JSON.parse(document.getElementById('evaluationJson').value));out.textContent='Validated definition imported.';loadEvaluations()}catch(e){out.textContent=e.message}}
async function calculateHealth(){const out=document.getElementById('healthResult');try{const d=await post('/api/analytics/health',{signals:[{name:'task_success',weight:1,severity:Number(document.getElementById('healthSeverity').value),confidence:.9,sample_count:100,minimum_samples:30},{name:'correction_rate',weight:1,severity:.7,confidence:.9,sample_count:100,minimum_samples:30}]});out.textContent=`Risk ${d.risk}/100 · ${d.band} · ${d.recommend_fine_tuning?'fine-tuning candidate':'no training recommendation'}`}catch(e){out.textContent=e.message}}
async function loadAutomation(){try{const [tm,pr]=await Promise.all([fetch('/api/models/catalog').then(r=>r.json()),fetch('/api/pipeline-runs').then(r=>r.json())]),teacher=document.getElementById('teacherModel'),student=document.getElementById('pipelineStudent'),teachers=document.getElementById('teacherProfiles'),students=document.getElementById('studentProfiles');if(teacher){teacher.innerHTML=(tm.teachers||[]).map(m=>`<option value="${esc(m.model_id)}">${esc(m.model_id)} · ${esc(m.license)}</option>`).join('');student.innerHTML=(tm.students||[]).map(m=>`<option value="${esc(m.model_id)}" data-modes="${esc((m.training_modes||[]).join(','))}">${esc(m.model_id)} · ${(m.training_modes||[]).join(' + ')}</option>`).join('');teachers.innerHTML=(tm.teachers||[]).map(m=>`<tr><td><code>${esc(m.model_id)}</code></td><td>${esc(m.license)}</td><td>${esc(m.context_length||'provider default')}</td><td>${esc(m.source)}</td></tr>`).join('')||'<tr><td colspan="4">No live, license-evidenced teacher is currently available.</td></tr>';students.innerHTML=(tm.students||[]).map(m=>`<tr><td><code>${esc(m.model_id)}</code></td><td>${esc(m.license)}</td><td>${esc((m.training_modes||[]).join(', '))}</td><td>${esc(m.verified_at)}</td></tr>`).join('');const notice=document.getElementById('modelCatalogStatus');notice.textContent=tm.warning?`Live teacher refresh unavailable: ${tm.warning}`:`${tm.teacher_count_live} live Nebius models checked · ${(tm.teachers||[]).length} have license evidence · ${(tm.students||[]).length} are documented for fine-tuning.`;syncStudentModes()}renderPipelineRuns(pr.runs||[])}catch(e){const out=document.getElementById('pipelineResult');if(out)out.textContent=e.message}}
function syncStudentModes(){const student=document.getElementById('pipelineStudent'),mode=document.getElementById('pipelineMode');if(!student||!mode)return;const supported=(student.selectedOptions[0]?.dataset.modes||'').split(',');[...mode.options].forEach(option=>option.disabled=!supported.includes(option.value));if(mode.selectedOptions[0]?.disabled)mode.value=supported[0]||''}
function pipelinePayload(){const live=document.getElementById('pipelineLive').checked;return {idempotency_key:document.getElementById('pipelineKey').value||crypto.randomUUID(),harness:document.getElementById('pipelineHarness').value,teacher_model:document.getElementById('teacherModel').value,student_model:document.getElementById('pipelineStudent').value,dataset_path:document.getElementById('pipelineDataset').value,training_mode:document.getElementById('pipelineMode').value,stages:live?['preflight','generate','prepare','submit','monitor','evaluate']:['preflight','generate','prepare','evaluate'],live,max_seconds:Number(document.getElementById('pipelineSeconds').value),max_cost_usd:Number(document.getElementById('pipelineBudget').value),evaluation_profile:'required-default',seed_path:'data/seeds/digital-analytics-1000.jsonl',catalog_path:'data/generated/digital-analytics-catalogs.json',teacher_output_path:'data/generated/ui-nebius-teacher.jsonl'}}
async function startPipeline(){const out=document.getElementById('pipelineResult'),payload=pipelinePayload();out.textContent='Validating immutable run request…';try{if(payload.live){if(!confirm(`Authorize live ${payload.training_mode} pipeline through ${payload.harness} with a maximum cost of $${payload.max_cost_usd}? This may upload data and create a Nebius job.`))return;const approval=await post('/api/pipeline-approvals',payload);payload.approval_id=approval.approval_id;payload.approval_nonce=approval.approval_nonce}const run=await post('/api/pipeline-runs',payload);document.getElementById('pipelineKey').value=payload.idempotency_key;out.textContent=`Run ${run.id} queued through ${run.harness}.`;monitorPipeline()}catch(e){out.textContent=e.message}}
async function monitorPipeline(){try{const d=await fetch('/api/pipeline-runs').then(r=>r.json());renderPipelineRuns(d.runs||[])}catch(e){const out=document.getElementById('pipelineResult');if(out)out.textContent=e.message}}
function renderPipelineRuns(runs){const body=document.getElementById('pipelineRuns');if(!body)return;body.innerHTML=runs.map(r=>`<tr><td><code>${esc(r.id)}</code><br><small>${esc(r.harness)}</small></td><td class="${esc(r.state)}">${esc(r.state)}</td><td>${esc(r.stage)} · ${Number(r.progress).toFixed(0)}%</td><td>${esc(r.teacher_model)}<br><small>${esc(r.request?.training_mode)} · ${r.request?.live?'live':'dry run'}</small></td><td><small>${esc(r.error_summary||r.events?.at(-1)?.message||'queued')}</small></td></tr>`).join('')||'<tr><td colspan="5">No pipeline runs yet.</td></tr>';assignViews();showView(currentView);loadSchedules();ensureAlertUI();loadNotifications();loadEvaluations()}
async function calculateSavings(){const out=document.getElementById('costResult'),n=id=>Number(document.getElementById(id).value);try{const d=await post('/api/analytics/cost-comparison',{base_comparison_key:document.getElementById('baseKey').value,tuned_comparison_key:document.getElementById('tunedKey').value,base_tokens:n('baseTokens'),tuned_tokens:n('tunedTokens'),base_cost:n('baseCost'),tuned_cost:n('tunedCost'),training_cost:n('trainingCost'),evaluation_cost:n('evaluationCost'),deployment_setup_cost:n('deploymentCost'),expected_requests:n('expectedRequests'),base_successes:n('baseSuccesses'),tuned_successes:n('tunedSuccesses')});out.textContent=d.comparable?`Token savings ${Number(d.token_savings_pct).toFixed(1)}% · cost savings ${Number(d.cost_savings_pct).toFixed(1)}% · break-even ${d.break_even_requests==null?'not reached':Number(d.break_even_requests).toFixed(0)+' requests'} · tuned cost/success $${Number(d.tuned_cost_per_success).toFixed(4)}`:`Not comparable: ${d.reason}`}catch(e){out.textContent=e.message}}

function initVoice(){const input=document.getElementById('voiceQuestion'),answer=document.getElementById('voiceAnswer'),speak=document.getElementById('speakButton');if(!input)return;input.value=lastQuestion;answer.textContent=lastAnswer;const SR=window.SpeechRecognition||window.webkitSpeechRecognition;if(SR){if(!recognition){recognition=new SR();recognition.lang='en-US';recognition.interimResults=false;recognition.onstart=()=>{voiceBusy=true;indicator('sttIndicator','busy','Listening');document.getElementById('listenButton').disabled=true};recognition.onresult=e=>{lastQuestion=e.results[0][0].transcript;document.getElementById('voiceQuestion').value=lastQuestion;askDashboard()};recognition.onerror=e=>{indicator('sttIndicator','offline',`Microphone ${e.error}`);document.getElementById('voiceStatus').innerHTML=`<small class="failed">Speech recognition: ${esc(e.error)}</small>`};recognition.onend=()=>{voiceBusy=false;indicator('sttIndicator','ready','Microphone ready');document.getElementById('listenButton').disabled=false}}indicator('sttIndicator','ready','Microphone ready');document.getElementById('listenButton').disabled=false}else{indicator('sttIndicator','offline','Microphone unavailable')}if('speechSynthesis'in window&&'SpeechSynthesisUtterance'in window){window.speechSynthesis.getVoices();window.speechSynthesis.onvoiceschanged=()=>indicator('ttsIndicator','ready','Speaker ready');indicator('ttsIndicator','ready','Speaker ready');speak.disabled=!lastAnswer||lastAnswer.startsWith('Answers are')}else{indicator('ttsIndicator','offline','Speaker unavailable');speak.disabled=true}voiceState()}
async function voiceState(){try{const r=await fetch(VOICE_API+'/api/voice/status');const s=await r.json(),sources=(s.knowledge_sources||[]).length;indicator('serviceIndicator',s.configured?'ready':'offline',s.configured?`Q&A ready · ${sources} sources`:'Q&A disabled');document.getElementById('voiceStatus').innerHTML=`<small>${esc(s.model||'model not configured')} · grounded in ${sources} repository sources · $${Number(s.spent_usd).toFixed(4)} spent / $${Number(s.budget_usd).toFixed(2)} hard limit</small>`;document.getElementById('askButton').disabled=!s.configured}catch(e){indicator('serviceIndicator','offline','Q&A offline');document.getElementById('voiceStatus').innerHTML='<small class="failed">Voice subprocess is offline. Start <code>python3 ui/voice_server.py</code>.</small>';document.getElementById('askButton').disabled=true}}
async function askDashboard(){const input=document.getElementById('voiceQuestion'),answer=document.getElementById('voiceAnswer'),ask=document.getElementById('askButton'),speak=document.getElementById('speakButton'),q=input.value.trim();if(!q)return;lastQuestion=q;voiceBusy=true;ask.disabled=true;answer.textContent='Thinking…';indicator('serviceIndicator','busy','Q&A answering');try{const r=await fetch(VOICE_API+'/api/voice/ask',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({question:q})});const d=await r.json();if(!r.ok)throw new Error(d.error||'Request failed');lastAnswer=d.answer;answer.textContent=lastAnswer;speak.disabled=false;document.getElementById('voiceStatus').innerHTML=`<small>Last request: $${Number(d.cost_usd).toFixed(6)} · total $${Number(d.budget.spent_usd).toFixed(4)} / $${Number(d.budget.budget_usd).toFixed(2)}</small>`;indicator('serviceIndicator','ready','Q&A ready');speakAnswer()}catch(e){lastAnswer=e.message;answer.textContent=lastAnswer;indicator('serviceIndicator','offline','Q&A error')}finally{voiceBusy=false;ask.disabled=false}}
function listen(){if(!recognition){initVoice();return}try{recognition.start()}catch(e){document.getElementById('voiceStatus').innerHTML='<small class="failed">Microphone is already active.</small>'}}
function speakAnswer(){if(!('speechSynthesis'in window)||!lastAnswer)return;window.speechSynthesis.cancel();const utterance=new SpeechSynthesisUtterance(lastAnswer);utterance.lang='en-US';utterance.onstart=()=>indicator('ttsIndicator','busy','Speaking');utterance.onend=()=>indicator('ttsIndicator','ready','Speaker ready');utterance.onerror=()=>indicator('ttsIndicator','offline','Speaker error');window.speechSynthesis.speak(utterance)}
load();setInterval(()=>{if(!voiceBusy)load()},60000);setInterval(voiceState,30000);setInterval(monitorPipeline,5000);
</script>
