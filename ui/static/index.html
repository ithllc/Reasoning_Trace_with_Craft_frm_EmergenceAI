<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CRAFT Reasoning Lab</title>
  <style>
    :root{color-scheme:dark;--bg:#08111f;--panel:#111d30;--line:#263955;--text:#edf4ff;--muted:#98aac2;--cyan:#42d3ff;--green:#48dc9b;--amber:#ffbd59;--red:#ff6f7d}*{box-sizing:border-box}body{margin:0;background:radial-gradient(circle at 12% 0,#173352 0,transparent 34%),var(--bg);color:var(--text);font:15px/1.5 Inter,system-ui,sans-serif}header{padding:36px clamp(20px,5vw,70px) 20px;display:flex;justify-content:space-between;align-items:end}h1{margin:0;font-size:clamp(30px,5vw,58px);letter-spacing:-.05em}h1 span{color:var(--cyan)}header p{color:var(--muted);max-width:560px}.actions{display:flex;gap:10px}button{border:1px solid var(--line);background:#172842;color:var(--text);padding:9px 13px;border-radius:9px;cursor:pointer}button:hover{border-color:var(--cyan)}main{padding:10px clamp(20px,5vw,70px) 60px}.grid{display:grid;grid-template-columns:repeat(12,1fr);gap:16px}.card{grid-column:span 4;background:linear-gradient(145deg,#14233a,#0d1829);border:1px solid var(--line);border-radius:16px;padding:20px;box-shadow:0 16px 45px #0005}.wide{grid-column:span 8}.full{grid-column:1/-1}.label{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.12em}.metric{font-size:27px;font-weight:750;margin:6px 0}.pill{display:inline-block;border:1px solid var(--line);border-radius:99px;padding:3px 9px;margin:3px;color:var(--muted)}.passed{color:var(--green)}.needs_review,.queued{color:var(--amber)}.running{color:var(--cyan)}.failed,.cancelled{color:var(--red)}table{width:100%;border-collapse:collapse;margin-top:10px}th,td{text-align:left;padding:11px 8px;border-bottom:1px solid var(--line);vertical-align:top}th{color:var(--muted);font-weight:500}code{color:#b9e9ff}small{color:var(--muted)}@media(max-width:900px){.card,.wide{grid-column:1/-1}header{display:block}.actions{margin-top:15px}}
  </style>
</head>
<body>
<header><div><div class="label">Emergence CRAFT × Nebius Token Factory</div><h1>Reasoning <span>Lab</span></h1><p>Manage grounded teacher traces, dataset review, Qwen LoRA training, and promotion evaluations from one local control surface.</p></div><div class="actions"><button onclick="load()">Refresh</button></div></header>
<main><div id="app" class="grid"><div class="card full">Loading live project state…</div></div></main>
<script>
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
async function review(id,status){await fetch('/api/reviews/'+encodeURIComponent(id),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});load()}
async function cancelJob(id){if(!confirm('Cancel '+id+'?'))return;await fetch('/api/jobs/'+encodeURIComponent(id)+'/cancel',{method:'POST',headers:{'Content-Type':'application/json'},body:'{}'});load()}
async function load(){const r=await fetch('/api/dashboard');const d=await r.json();if(d.error){app.innerHTML='<div class="card full failed">'+esc(d.error)+'</div>';return}const ex=d.examples||[],jobs=d.jobs||[],passed=ex.filter(x=>x.validation==='passed').length;app.innerHTML=`
<section class="card"><div class="label">Teacher</div><div class="metric">${esc(d.teacher.verified_model_id)}</div><small>${esc(d.teacher.agent_name)} · structured decision summaries</small></section>
<section class="card"><div class="label">Student</div><div class="metric">Qwen3 A3B</div><small>${esc(d.student.model)} · ${esc(d.student.parameter_count)}</small></section>
<section class="card"><div class="label">Review progress</div><div class="metric">${passed}/${ex.length}</div><small>examples approved</small></section>
<section class="card wide"><div class="label">Dataset examples</div><table><thead><tr><th>ID</th><th>Domain</th><th>Decision</th><th>Status</th><th>Action</th></tr></thead><tbody>${ex.map(x=>`<tr><td><code>${esc(x.id)}</code></td><td>${esc(x.domain)}</td><td>${esc(x.decision_summary)}</td><td class="${esc(x.validation)}">${esc(x.validation)}</td><td><button onclick="review('${esc(x.id)}','passed')">Approve</button> <button onclick="review('${esc(x.id)}','needs_review')">Reset</button></td></tr>`).join('')}</tbody></table></section>
<section class="card"><div class="label">LoRA configuration</div><div class="metric">r=${esc(d.training.hyperparameters.lora_r)}</div><span class="pill">alpha ${esc(d.training.hyperparameters.lora_alpha)}</span><span class="pill">batch ${esc(d.training.hyperparameters.batch_size)}</span><span class="pill">epochs ${esc(d.training.hyperparameters.n_epochs)}</span><span class="pill">ctx ${esc(d.training.hyperparameters.context_length)}</span></section>
<section class="card full"><div class="label">Nebius fine-tuning jobs</div>${d.jobs_error?`<p class="failed">${esc(d.jobs_error)}</p>`:''}<table><thead><tr><th>Job</th><th>Model</th><th>Status</th><th>Progress</th><th>Action</th></tr></thead><tbody>${jobs.map(j=>`<tr><td><code>${esc(j.id)}</code></td><td>${esc(j.model)}</td><td class="${esc(j.status)}">${esc(j.status)}</td><td>${esc(j.trained_steps??0)} / ${esc(j.total_steps??'?')}</td><td>${['running','queued','validating_files'].includes(j.status)?`<button onclick="cancelJob('${esc(j.id)}')">Cancel</button>`:''}</td></tr>`).join('')||'<tr><td colspan="5">No jobs</td></tr>'}</tbody></table></section>
<section class="card full"><div class="label">LLM evaluation suite</div><table><thead><tr><th>Task</th><th>Metrics</th><th>Qwythos reference</th></tr></thead><tbody>${d.evaluations.benchmarks.map(b=>`<tr><td>${esc(b.task)}</td><td>${b.metrics.map(m=>`<span class="pill">${esc(m)}</span>`).join('')}</td><td>${b.qwythos_reference.map(esc).join(', ')}</td></tr>`).join('')}</tbody></table><p><small>CRAFT promotion gate: ${(d.evaluations.craft_evals.required_pass_rate*100).toFixed(0)}% · No regression vs base required.</small></p></section>`}
load();setInterval(load,15000);
</script>
</body></html>
